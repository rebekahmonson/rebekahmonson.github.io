<script>
const GOOGLE_CLIENT_ID = '351754476942-cukvoeppmd2pgqp5nidqjl67a4pjcnqm.apps.googleusercontent.com';
const ALLOWED_DOMAIN = 'tryletterhead.com';

let accessToken = null;
let tokenClient = null;

// Initialize OAuth2 Token Client
function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
    callback: handleTokenResponse,
    error_callback: function(err) {
      console.error('Token error:', err);
      const errEl = document.getElementById('loginError');
      errEl.textContent = 'Sign-in failed: ' + (err.message || 'Unknown error. Please try again.');
      errEl.style.display = 'block';
    },
  });
}

function startGoogleSignIn() {
  if (!tokenClient) initTokenClient();
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function handleTokenResponse(tokenResponse) {
  if (tokenResponse.error) {
    const errEl = document.getElementById('loginError');
    errEl.textContent = 'Authorization failed: ' + tokenResponse.error;
    errEl.style.display = 'block';
    return;
  }

  accessToken = tokenResponse.access_token;
  const expiresAt = Date.now() + (tokenResponse.expires_in * 1000);
  sessionStorage.setItem('sheets_access_token', accessToken);
  sessionStorage.setItem('sheets_token_expires', expiresAt.toString());

  try {
    // Fetch user info to check domain
    const userResp = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    const userInfo = await userResp.json();
    const email = userInfo.email || '';
    const domain = email.split('@')[1];

    if (domain !== ALLOWED_DOMAIN) {
      accessToken = null;
      sessionStorage.removeItem('sheets_access_token');
      sessionStorage.removeItem('sheets_token_expires');
      google.accounts.oauth2.revoke(tokenResponse.access_token);
      const errEl = document.getElementById('loginError');
      errEl.textContent = 'Access restricted to @' + ALLOWED_DOMAIN + ' accounts. You signed in as ' + email;
      errEl.style.display = 'block';
      return;
    }

    // Auth success
    document.getElementById('loginOverlay').style.display = 'none';
    const appWrap = document.getElementById('appWrap');
    appWrap.style.display = 'block';
    appWrap.classList.add('authenticated');

    // Show user info
    const userInfoEl = document.getElementById('userInfo');
    if (userInfo.picture) {
      userInfoEl.innerHTML = '<img src="' + userInfo.picture + '" alt=""> ' + (userInfo.name || email);
    } else {
      userInfoEl.textContent = email;
    }

    sessionStorage.setItem('user_email', email);
    sessionStorage.setItem('user_name', userInfo.name || email);
    sessionStorage.setItem('user_picture', userInfo.picture || '');

    // Load dashboard
    init();
  } catch (e) {
    console.error('User info fetch error:', e);
    const errEl = document.getElementById('loginError');
    errEl.textContent = 'Could not verify your account. Please try again.';
    errEl.style.display = 'block';
  }
}

function handleSignOut() {
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken);
  }
  accessToken = null;
  sessionStorage.removeItem('sheets_access_token');
  sessionStorage.removeItem('sheets_token_expires');
  sessionStorage.removeItem('user_email');
  sessionStorage.removeItem('user_name');
  sessionStorage.removeItem('user_picture');
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('appWrap').classList.remove('authenticated');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><span style="color:var(--text-muted);font-size:14px;">Sign in to view data...</span></div>';
}

// Check for existing session on load
window.addEventListener('load', function() {
  initTokenClient();
  const token = sessionStorage.getItem('sheets_access_token');
  const expires = parseInt(sessionStorage.getItem('sheets_token_expires') || '0');
  if (token && Date.now() < expires) {
    const email = sessionStorage.getItem('user_email') || '';
    if (email.endsWith('@' + ALLOWED_DOMAIN)) {
      accessToken = token;
      document.getElementById('loginOverlay').style.display = 'none';
      const appWrap = document.getElementById('appWrap');
      appWrap.style.display = 'block';
      appWrap.classList.add('authenticated');
      const userInfoEl = document.getElementById('userInfo');
      const pic = sessionStorage.getItem('user_picture');
      const name = sessionStorage.getItem('user_name') || email;
      if (pic) {
        userInfoEl.innerHTML = '<img src="' + pic + '" alt=""> ' + name;
      } else {
        userInfoEl.textContent = name;
      }
      init();
      return;
    }
  }
  // Clear stale session
  sessionStorage.removeItem('sheets_access_token');
  sessionStorage.removeItem('sheets_token_expires');
});

const SHEET_ID = '1g8FOuKK14xUkL8S8pwKJG-fBdEeyn65dugJn_GYTRrg';
const TRACKER_GID = '1637880674';

// Metric metadata — loaded dynamically from the Definitions sheet
let META = {};
const DEFINITIONS_GID = '0'; // GID for Definitions tab

// Unit inference from metric name/definition
function inferUnit(metricName, definition) {
  const n = (metricName || '').toLowerCase();
  const d = (definition || '').toLowerCase();
  if (n.includes('carr') || n.includes('arr') || n.includes('pipeline coverage arr')) return 'US Dollars';
  if (n.includes('burn') || n.includes('rate') || n.includes('win rate')) return 'Percentage';
  if (n.includes('velocity-share')) return 'Ratio';
  if (n.includes('nps') || n.includes('csat') || n.includes('quality')) return 'Score';
  if (n.includes('lead time') || n.includes('time to close')) return 'Days';
  if (n.includes('time to first value')) return 'Minutes';
  if (d.includes('percentage') || d.includes('%')) return 'Percentage';
  if (d.includes('dollar') || d.includes('$') || d.includes('arr')) return 'US Dollars';
  return 'Number';
}

async function fetchDefinitions() {
  if (!accessToken) return;

  // Find the Definitions sheet name from metadata
  let defSheetName = 'Definitions';
  try {
    const metaResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`,
      { headers: { 'Authorization': 'Bearer ' + accessToken } }
    );
    if (metaResp.ok) {
      const metaData = await metaResp.json();
      const defSheet = metaData.sheets.find(s => s.properties.sheetId === parseInt(DEFINITIONS_GID));
      if (defSheet) defSheetName = defSheet.properties.title;
    }
  } catch(e) { console.warn('Could not resolve Definitions sheet name:', e); }

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(defSheetName)}`;
  const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
  if (!resp.ok) {
    console.warn('Could not fetch Definitions sheet, using fallback META');
    return;
  }
  const data = await resp.json();
  if (!data.values || data.values.length < 2) return;

  // Parse header to find column indices
  const header = data.values[0].map(h => (h || '').trim().toLowerCase());
  const nameIdx = header.findIndex(h => h.includes('metric name') || h === 'metric name');
  const deptIdx = header.findIndex(h => h.includes('department') || h === 'department');
  const typeIdx = header.findIndex(h => h.includes('type') || h === 'type');
  const ownerIdx = header.findIndex(h => h.includes('owner') || h === 'owner');
  const defIdx = header.findIndex(h => h.includes('definition') || h.includes('formula'));

  if (nameIdx === -1) {
    console.warn('Definitions sheet missing Metric name column');
    return;
  }

  META = {};
  data.values.slice(1).forEach(row => {
    const metricName = (row[nameIdx] || '').trim();
    if (!metricName) return;
    const dept = deptIdx >= 0 ? (row[deptIdx] || '').trim() : 'Other';
    const type = typeIdx >= 0 ? (row[typeIdx] || '').trim() : 'KPI';
    const owner = ownerIdx >= 0 ? (row[ownerIdx] || '').trim() : '';
    const definition = defIdx >= 0 ? (row[defIdx] || '').trim() : '';
    META[metricName] = {
      dept: dept || 'Other',
      type: type || 'KPI',
      unit: inferUnit(metricName, definition),
      owner: owner,
      definition: definition,
    };
  });

  console.log('Loaded definitions for', Object.keys(META).length, 'metrics');
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  return lines.map(line => {
    const fields = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === ',' && !inQuotes) { fields.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    fields.push(current.trim());
    return fields;
  });
}

function parseValue(val) {
  if (!val || val === '') return null;
  const cleaned = val.replace('%', '').replace('$', '').replace(/,/g, '');
  const num = parseFloat(cleaned);
  return isNaN(num) ? null : num;
}

function parseDate(str) {
  if (!str) return null;
  // Handle M/D/YYYY format
  const parts = str.split('/');
  if (parts.length >= 3) {
    const month = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    const year = parseInt(parts[2]);
    if (!isNaN(month) && !isNaN(day) && !isNaN(year)) return new Date(year, month, day);
  }
  // Handle M/D format (missing year — assume 2026)
  if (parts.length === 2) {
    const month = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    if (!isNaN(month) && !isNaN(day)) return new Date(2026, month, day);
  }
  // Fallback: try native parse
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatValue(val, unit) {
  if (val === null || val === undefined) return '—';
  if (unit === 'Percentage') return val.toFixed(1) + '%';
  if (unit === 'US Dollars') return '$' + val.toLocaleString();
  if (unit === 'Ratio') return (val * 100).toFixed(0) + '%';
  if (Number.isInteger(val)) return val.toLocaleString();
  return val.toFixed(1);
}

// Fetch data via Google Sheets API v4 using OAuth2 access token
async function fetchSheetData() {
  if (!accessToken) {
    throw new Error('Not authenticated. Please sign in again.');
  }

  // First, get sheet metadata to find the tab name for GID 1637880674
  let sheetName = 'Tracker'; // default guess
  try {
    const metaResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`,
      { headers: { 'Authorization': 'Bearer ' + accessToken } }
    );
    if (metaResp.status === 401) {
      // Token expired — clear session and prompt re-login
      accessToken = null;
      sessionStorage.removeItem('sheets_access_token');
      throw new Error('Session expired. Please sign in again.');
    }
    if (!metaResp.ok) {
      throw new Error(`Sheets API error (${metaResp.status}): ${await metaResp.text()}`);
    }
    const metaData = await metaResp.json();
    const trackerSheet = metaData.sheets.find(s => s.properties.sheetId === parseInt(TRACKER_GID));
    if (trackerSheet) {
      sheetName = trackerSheet.properties.title;
    }
  } catch(e) {
    if (e.message.includes('Session expired')) throw e;
    console.warn('Could not resolve sheet name, using default:', e.message);
  }

  // Fetch all data from the tracker sheet
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  });

  if (resp.status === 401) {
    accessToken = null;
    sessionStorage.removeItem('sheets_access_token');
    throw new Error('Session expired. Please sign in again.');
  }
  if (resp.status === 403) {
    throw new Error('You do not have access to this spreadsheet. Ask the sheet owner to share it with your @tryletterhead.com account.');
  }
  if (!resp.ok) {
    throw new Error(`Sheets API error (${resp.status}): ${await resp.text()}`);
  }

  const data = await resp.json();
  if (!data.values || data.values.length === 0) {
    throw new Error('The Tracker sheet appears to be empty.');
  }

  return data.values; // array of arrays (rows)
}

function processData(rows) {
  // rows is an array of arrays from Sheets API
  const header = rows[0];
  const data = rows.slice(1).map(r => ({
    date: (r[0] || '').trim(),
    period: (r[1] || '').trim(),
    metric: (r[2] || '').trim(),
    value: (r[3] || '').trim(),
    target: (r[4] || '').trim(),
  })).filter(r => r.date && r.metric);

  // Group by metric
  const byMetric = {};
  data.forEach(r => {
    if (!byMetric[r.metric]) byMetric[r.metric] = [];
    byMetric[r.metric].push(r);
  });

  // Sort each metric's entries by date
  Object.values(byMetric).forEach(arr => {
    arr.sort((a, b) => {
      const da = parseDate(a.date);
      const db = parseDate(b.date);
      return (da || 0) - (db || 0);
    });
  });

  return byMetric;
}

function getTrend(entries) {
  const vals = entries.map(e => parseValue(e.value)).filter(v => v !== null);
  if (vals.length < 2) return 'flat';
  const last = vals[vals.length - 1];
  const prev = vals[vals.length - 2];
  if (last > prev) return 'up';
  if (last < prev) return 'down';
  return 'flat';
}

function renderFilters() {
  const depts = ['all', ...new Set(Object.values(META).map(m => m.dept))];
  const container = document.getElementById('filters');
  container.innerHTML = depts.map(d =>
    `<button class="filter-btn ${d === activeFilter ? 'active' : ''}" onclick="setFilter('${d}')">${d === 'all' ? 'All Departments' : d}</button>`
  ).join('');
}

function setFilter(dept) {
  activeFilter = dept;
  renderFilters();
  renderDashboard(window._lastData);
}

function renderDashboard(byMetric) {
  window._lastData = byMetric;

  // Determine which metrics to show

    if (activeFilter === 'all') return true;
    const meta = META[m];
    return meta && meta.dept === activeFilter;
  });

  // Group by department
  const byDept = {};
  metrics.forEach(m => {
    const dept = (META[m] || {}).dept || 'Other';
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(m);
  });

  let html = '';

  // ── KPI Summary Cards ──
  html += '<div class="kpi-grid">';
  // Show North Stars first, then KPIs
  const northStars = metrics.filter(m => META[m] && META[m].type === 'North Star');
  const kpis = metrics.filter(m => !northStars.includes(m));
  const orderedMetrics = [...northStars, ...kpis];

  orderedMetrics.forEach(metric => {
    const entries = byMetric[metric];
    const meta = META[metric] || { dept: 'Other', unit: '', type: 'KPI' };
    const deptStyle = DEPT_COLORS[meta.dept] || DEPT_COLORS['All-Company'];
    const latestEntry = entries[entries.length - 1];
    const val = parseValue(latestEntry.value);
    const target = parseValue(latestEntry.target);
    const trend = getTrend(entries);
    const trendIcon = trend === 'up' ? '&#9650;' : trend === 'down' ? '&#9660;' : '&#9654;';
    const isNPSorNeg = metric === 'NPS' || metric.includes('burn');
    const trendClass = trend === 'up' ? (isNPSorNeg ? 'trend-up' : 'trend-up') : trend === 'down' ? (isNPSorNeg ? 'trend-down' : 'trend-down') : 'trend-flat';
    const starBadge = meta.type === 'North Star' ? ' &#9733;' : '';

    const defTip = meta.definition ? `<span class="info-bubble">i<span class="info-tip">${meta.definition.replace(/"/g, '&quot;').replace(/</g, '&lt;')}${meta.owner ? '<div class="info-owner">Owner: ' + meta.owner.replace(/</g, '&lt;') + '</div>' : ''}</span></span>` : '';

    html += `
      <div class="kpi-card">
        <div class="label" title="${metric}">${metric}${starBadge} ${defTip}</div>
        <div class="value">${formatValue(val, meta.unit)}</div>
        <div class="meta">
          <span class="${trendClass}">${trendIcon}</span>
          ${target !== null ? `<span class="target">Target: ${formatValue(target, meta.unit)}</span>` : ''}
        </div>
        <span class="dept-tag ${deptStyle.class}">${meta.dept}</span>
      </div>`;
  });
  html += '</div>';

  // ── Charts by Department ──
  const deptOrder = ['All-Company', 'Revenue/GTM', 'Product', 'Engineering', 'Support/CX', 'CX', 'Finance', 'Operations', 'Other'];
  const deptIcons = { 'All-Company': '&#9733;', 'Revenue/GTM': '&#128200;', 'Product': '&#9881;', 'Engineering': '&#128736;', 'Support/CX': '&#128172;', 'CX': '&#128172;', 'Finance': '&#128176;', 'Operations': '&#9881;', 'Other': '&#9679;' };

  deptOrder.forEach(dept => {
    const deptMetrics = byDept[dept];
    if (!deptMetrics || deptMetrics.length === 0) return;
    const deptColor = DEPT_COLORS[dept] || DEPT_COLORS['All-Company'];

    html += `<div class="section-title">
      <span class="icon" style="background:${deptColor.bg}">${deptIcons[dept] || '&#9679;'}</span>
      ${dept}
    </div>`;

    html += '<div class="chart-grid">';

    // Group related metrics into chart groupings
    const velocityMetrics = deptMetrics.filter(m => m.startsWith('Velocity-Share'));
    const otherMetrics = deptMetrics.filter(m => !m.startsWith('Velocity-Share'));

    // Individual charts for each non-velocity metric
    otherMetrics.forEach(metric => {
      const canvasId = 'chart_' + metric.replace(/[^a-zA-Z0-9]/g, '_');
      const meta = META[metric] || { unit: '' };
      const chartTip = meta.definition ? `<span class="info-bubble">i<span class="info-tip">${meta.definition.replace(/"/g, '&quot;').replace(/</g, '&lt;')}${meta.owner ? '<div class="info-owner">Owner: ' + meta.owner.replace(/</g, '&lt;') + '</div>' : ''}</span></span>` : '';

          <h3>${metric} ${chartTip}</h3>
          <div class="chart-subtitle">${meta.type === 'North Star' ? '&#9733; North Star' : 'KPI'} &middot; ${meta.unit || 'Value'}</div>
          <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
        </div>`;
    });

    // Combined velocity chart
    if (velocityMetrics.length > 0) {
      html += `
        <div class="chart-card">
          <h3>Engineering Velocity Share</h3>
          <div class="chart-subtitle">KPI &middot; Share of velocity by area</div>
          <div class="chart-wrap"><canvas id="chart_velocity"></canvas></div>
        </div>`;
    }

    html += '</div>';
  });

  content.innerHTML = html;

  // ── Destroy old charts ──
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // ── Create Charts ──
  Chart.defaults.color = '#8b8fa3';
  Chart.defaults.borderColor = 'rgba(45,49,65,0.5)';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';

  deptOrder.forEach(dept => {
    const deptMetrics = byDept[dept];
    if (!deptMetrics) return;
    const deptColor = DEPT_COLORS[dept] || DEPT_COLORS['All-Company'];

    const velocityMetrics = deptMetrics.filter(m => m.startsWith('Velocity-Share'));
    const otherMetrics = deptMetrics.filter(m => !m.startsWith('Velocity-Share'));

    otherMetrics.forEach((metric, idx) => {
      const canvasId = 'chart_' + metric.replace(/[^a-zA-Z0-9]/g, '_');
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const entries = byMetric[metric];
      const meta = META[metric] || { unit: '' };
      const labels = entries.map(e => { const d = parseDate(e.date); return d ? formatDate(d) : e.date; });
      const values = entries.map(e => parseValue(e.value));
      const targets = entries.map(e => parseValue(e.target));
      const hasTarget = targets.some(t => t !== null);
      const color = deptColor.border;

      const datasets = [{
        label: metric,
        data: values,
        borderColor: color,
        backgroundColor: color.replace(')', ',0.1)').replace('rgb', 'rgba'),
        fill: true,
        tension: 0.35,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: color,
        borderWidth: 2.5,

      if (hasTarget) {
        datasets.push({
          label: 'Target',
          data: targets,
          borderColor: 'rgba(255,255,255,0.25)',
          borderDash: [6, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
        });
      }

      charts[canvasId] = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: hasTarget, position: 'top', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } },
            tooltip: {
              backgroundColor: '#1a1d27',
              borderColor: '#2d3141',
              borderWidth: 1,
              titleFont: { size: 12 },
              bodyFont: { size: 12 },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${formatValue(ctx.parsed.y, meta.unit)}`
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: {
              grid: { color: 'rgba(45,49,65,0.4)' },
              ticks: {
                font: { size: 11 },
                callback: v => formatValue(v, meta.unit)
              }
            }
          }
        }
      });
    });

    // Velocity stacked bar chart
    if (velocityMetrics.length > 0) {
      const canvas = document.getElementById('chart_velocity');
      if (canvas) {
        // Collect all dates
        const allDates = new Set();
        velocityMetrics.forEach(m => byMetric[m].forEach(e => allDates.add(e.date)));
        const sortedDates = [...allDates].sort((a, b) => parseDate(a) - parseDate(b));
        const labels = sortedDates.map(d => { const p = parseDate(d); return p ? formatDate(p) : d; });

        const shortNames = {
          'Velocity-Share for Open ESP Integrations - Specifically': 'ESP Integrations',
          'Velocity-Share for Sales Engineering': 'Sales Eng',
          'Velocity-Share for Service': 'Service',
          'Velocity-Share for Letterhead Core': 'Core Product'
        };
        const vColors = ['#6c63ff', '#00d4aa', '#ffa94d', '#ff6b8a'];

        const datasets = velocityMetrics.map((m, i) => {
          const entries = byMetric[m];
          const dateMap = {};
          entries.forEach(e => dateMap[e.date] = parseValue(e.value));
          return {
            label: shortNames[m] || m,
            data: sortedDates.map(d => dateMap[d] !== undefined ? dateMap[d] * 100 : null),
            backgroundColor: vColors[i % vColors.length] + 'cc',
            borderColor: vColors[i % vColors.length],
            borderWidth: 1,
            borderRadius: 3,
          };
        });

        charts['chart_velocity'] = new Chart(canvas, {
          type: 'bar',
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { position: 'top', labels: { boxWidth: 10, padding: 8, font: { size: 10 } } },
              tooltip: {
                backgroundColor: '#1a1d27',
                borderColor: '#2d3141',
                borderWidth: 1,
                padding: 10,
                cornerRadius: 8,
                callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(0)}%` }
              }
            },
            scales: {
              x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
              y: {
                stacked: true,
                grid: { color: 'rgba(45,49,65,0.4)' },
                ticks: { font: { size: 11 }, callback: v => v + '%' },
                max: 100
              }
            }
          }
        });
      }
    }
  });

async function refreshData() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const lastUpdated = document.getElementById('lastUpdated');
  const errorBanner = document.getElementById('errorBanner');

  statusDot.style.background = 'var(--yellow)';
  statusText.textContent = 'Refreshing...';

  try {
    // Fetch definitions first (to get department mappings), then tracker data
    await fetchDefinitions();
    const rows = await fetchSheetData();
    const byMetric = processData(rows);

    // Also assign META for any tracker metrics not in Definitions
    Object.keys(byMetric).forEach(m => {
      if (!META[m]) {
        META[m] = { dept: 'Other', type: 'KPI', unit: inferUnit(m, ''), owner: '', definition: '' };
      }
    });

    renderFilters();
    renderDashboard(byMetric);

    const now = new Date();
    lastUpdated.textContent = `Live from Google Sheets \u2022 Last refresh: ${now.toLocaleTimeString()}`;
    statusDot.style.background = 'var(--green)';
    statusText.textContent = 'Connected';
    errorBanner.style.display = 'none';
  } catch (err) {
    statusDot.style.background = 'var(--red)';
    statusText.textContent = 'Error';
    let fixMsg = '';
    if (err.message.includes('Session expired') || err.message.includes('Not authenticated')) {
      fixMsg = '<strong>To fix this:</strong> Click "Sign out" and sign in again to refresh your session.';
    } else if (err.message.includes('do not have access')) {
      fixMsg = '<strong>To fix this:</strong> Ask the spreadsheet owner to share it with your Google account.';
    } else {
      fixMsg = '<strong>To fix this:</strong> Make sure you have access to the spreadsheet and try refreshing. If the problem persists, sign out and sign back in.';
    }
    errorBanner.innerHTML = `<strong>Could not fetch data:</strong> ${err.message}<br><br>${fixMsg}`;
    errorBanner.style.display = 'block';
    console.error(err);
  }
}

// init is called after successful Google Sign-In
function init() {
  refreshData();
  // Auto-refresh every 5 minutes
  if (!window._refreshInterval) {
    window._refreshInterval = setInterval(refreshData, 5 * 60 * 1000);
  }
}

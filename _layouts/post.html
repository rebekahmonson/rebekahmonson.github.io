---
layout: modern
---

<article class="post">
  <header class="post-header">
    <div class="container">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
